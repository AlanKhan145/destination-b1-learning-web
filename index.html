<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 1 - Grammar: Present time | English Grammar Learning</title>
  <meta name="description" content="Học ngữ pháp tiếng Anh trình độ B1 - Unit 1: Present time (present simple, present continuous, present perfect simple, present perfect continuous, stative verbs)." />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <!-- Thanh tiến độ đọc bài -->
  <div
    id="reading-progress"
    class="reading-progress"
    role="progressbar"
    aria-label="Tiến độ đọc bài"
    aria-valuemin="0"
    aria-valuemax="100"
    aria-valuenow="0"
  ></div>

  <!-- Khung giao diện chung: chỉ chứa các vùng chứa, nội dung được render bằng JavaScript -->
  <header id="site-header" class="site-header"></header>

  <main class="main-content">
    <section id="lesson-header" class="lesson-header"></section>
    <nav id="topic-navigation" class="topic-navigation" aria-label="Điều hướng nhanh chủ điểm"></nav>
    <section id="lesson-content" class="lesson-content"></section>
    <nav id="lesson-pagination" class="lesson-pagination" aria-label="Điều hướng bài học"></nav>
  </main>

  <footer id="site-footer" class="site-footer"></footer>

  <button
    id="back-to-top"
    class="back-to-top"
    type="button"
    aria-label="Quay lại đầu trang"
    hidden
  >
    ↑
  </button>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
