<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Learning</title>
  <meta name="description" content="Practice English grammar with a bilingual (English/Vietnamese) interface." />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <!-- Khung giao diện chung: chỉ chứa các vùng chứa, toàn bộ nội dung được render bằng JavaScript.
       Không viết cố định nội dung bài học hay chuỗi giao diện ở đây. -->

  <div
    id="reading-progress"
    class="reading-progress"
    role="progressbar"
    aria-valuemin="0"
    aria-valuemax="100"
    aria-valuenow="0"
    data-i18n-aria-label="navigation.readingProgress"
  ></div>

  <header id="site-header" class="site-header"></header>

  <main class="page-container">
    <nav id="workspace-tabs" class="workspace-tabs" hidden></nav>

    <div id="workspace" class="workspace">
      <div id="lesson-pane" class="lesson-pane">
        <section id="lesson-header" class="lesson-header"></section>

        <nav id="table-of-contents" class="table-of-contents"></nav>

        <section id="lesson-content" class="lesson-content"></section>

        <nav id="lesson-pagination" class="lesson-pagination"></nav>
      </div>

      <aside id="review-panel" class="review-panel" hidden></aside>
    </div>
  </main>

  <button
    id="back-to-top"
    class="back-to-top"
    type="button"
    hidden
    data-i18n-aria-label="navigation.backToTop"
  ></button>

  <footer id="site-footer" class="site-footer"></footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
